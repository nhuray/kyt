# Kyt Configuration
# Diff command configuration
diff:
  # Ignore differences for specific resources
  ignoreDifferences:
    # Ignore common metadata labels for all resources
    - group: ""
      kind: "*"
      jsonPointers:
        - /metadata/labels/app.kubernetes.io~1version
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration

    # Ignore Istio sidecars in Deployments
    - group: "apps"
      kind: "Deployment"
      jqPathExpressions:
        - .spec.template.spec.containers[] | select(.name == "istio-proxy")
        - .spec.template.spec.initContainers[] | select(.name == "istio-init")
        - .spec.template.metadata.annotations["sidecar.istio.io/status"]

    # Ignore replica count differences in production
    - group: "apps"
      kind: "Deployment"
      namespace: "production"
      jsonPointers:
        - /spec/replicas

    # Ignore HPA-managed fields
    - group: "apps"
      kind: "Deployment"
      managedFieldsManagers:
        - "kube-controller-manager"

  # Normalization options
  normalization:
    # Sort object keys alphabetically
    sortKeys: true

    # Sort arrays where order doesn't matter
    sortArrays:
      - path: ".spec.template.spec.containers[].ports"
        sortBy: "containerPort"
      - path: ".spec.template.spec.containers[].env"
        sortBy: "name"
      - path: ".spec.template.spec.volumes"
        sortBy: "name"

    # Remove fields that shouldn't be compared
    removeDefaultFields:
      - "/status"
      - "/metadata/managedFields"
      - "/metadata/creationTimestamp"
      - "/metadata/generation"
      - "/metadata/resourceVersion"
      - "/metadata/uid"

  # Diff options
  options:
    contextLines: 3 # Context lines for unified diff (default: 3)
    similarityThreshold: 0.7 # Min similarity score for matching resources (0.0-1.0, default: 0.7)
    dataSimilarityBoost: 2 # Boost factor for ConfigMap/Secret data fields (1-10, default: 2)
                           # Higher values give more weight to data content vs metadata
                           # Useful for matching ConfigMaps with different names but same data

  # Fuzzy string matching configuration
  fuzzyMatching:
    # Enable Levenshtein distance for comparing similar strings
    # When disabled, only exact string matches are considered equal
    # This is especially useful for ConfigMaps with large data fields that differ slightly
    enabled: true # default: true
    
    # Minimum string length (in characters) to apply fuzzy matching
    # Strings shorter than this use exact comparison
    # Higher values = faster but less accurate for short strings
    # Lower values = slower but more accurate
    minStringLength: 100 # default: 100
  
  # Optional: pipe output through external diff viewer
  # Only used when stdout is a terminal
  pager: "" # Examples: "delta --side-by-side", "bat --language=diff", "less -R"
