# k8s-diff Configuration for Helm to Kustomize Migration
# This configuration is specifically designed to compare Helm-rendered manifests
# with Kustomize-rendered manifests during a migration

ignoreDifferences:
  # Ignore Helm-specific labels and annotations
  - group: ""
    kind: "*"
    jsonPointers:
      - /metadata/labels/app.kubernetes.io~1managed-by
      - /metadata/labels/helm.sh~1chart
      - /metadata/annotations/meta.helm.sh~1release-name
      - /metadata/annotations/meta.helm.sh~1release-namespace

  # Ignore common kustomize build annotations
  - group: ""
    kind: "*"
    jsonPointers:
      - /metadata/annotations/config.kubernetes.io~1index
      - /metadata/annotations/config.kubernetes.io~1path
      - /metadata/annotations/internal.config.kubernetes.io~1index
      - /metadata/annotations/internal.config.kubernetes.io~1path

  # Ignore Istio sidecars (often injected differently)
  - group: "apps"
    kind: "Deployment"
    jqPathExpressions:
      - .spec.template.spec.containers[] | select(.name == "istio-proxy")
      - .spec.template.spec.initContainers[] | select(.name == "istio-init")
      - .spec.template.metadata.annotations["sidecar.istio.io/status"]
      - .spec.template.metadata.annotations["prometheus.io/path"]
      - .spec.template.metadata.annotations["prometheus.io/port"]
      - .spec.template.metadata.annotations["prometheus.io/scrape"]

  # Ignore default ServiceAccount token volume mounts
  - group: "apps"
    kind: "Deployment"
    jqPathExpressions:
      - .spec.template.spec.volumes[] | select(.name == "kube-api-access-*")
      - .spec.template.spec.containers[].volumeMounts[] | select(.name == "kube-api-access-*")

normalization:
  sortKeys: true
  sortArrays:
    - path: ".spec.template.spec.containers[].ports"
      sortBy: "containerPort"
    - path: ".spec.template.spec.containers[].env"
      sortBy: "name"
    - path: ".spec.template.spec.volumes"
      sortBy: "name"
    - path: ".spec.template.spec.containers[].volumeMounts"
      sortBy: "mountPath"

output:
  format: cli
  diffTool: difft
  colorize: true
  showUnchanged: false
