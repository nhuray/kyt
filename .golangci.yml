# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck # Check for unchecked errors
    - gosimple # Simplify code
    - govet # Reports suspicious constructs
    - ineffassign # Detect ineffectual assignments
    - staticcheck # Go static analysis
    - unused # Check for unused code
    - gofmt # Check formatting
    - goimports # Check imports
    - misspell # Check for misspelled words
    - revive # Replacement for golint
    - gosec # Security checks
    - bodyclose # Check HTTP response bodies are closed
    - gocritic # Comprehensive linter
    - unconvert # Remove unnecessary type conversions

linters-settings:
  errcheck:
    check-blank: false
    check-type-assertions: false

  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

  staticcheck:
    checks: ["all"]

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: superfluous-else
      - name: unreachable-code
      - name: redefines-builtin-id

  gosec:
    excludes:
      - G204 # Allow command execution (needed for diff tools)
      - G304 # Allow file path from variable (needed for manifest parsing)

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - gocritic
        - errcheck

    # Exclude known issues in vendor directories
    - path: vendor/
      linters:
        - all

  max-issues-per-linter: 50
  max-same-issues: 3

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
